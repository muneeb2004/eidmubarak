<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Joy - Error</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#e64cbf",
            "background-light": "#FFF7F9",
            "background-dark": "#21111d",
            "surface": "#FFFFFF",
            "text-main": "#4A3E4D",
            "muted": "#A89CAE"
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 48;
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-text-main antialiased selection:bg-primary/30 min-h-screen flex items-center justify-center p-6">
<div class="flex flex-col items-center justify-center max-w-md w-full text-center space-y-8 animate-fade-in">
<!-- Illustration / Icon -->
<div class="relative flex items-center justify-center w-32 h-32 mb-4">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-xl"></div>
<span class="material-symbols-outlined text-muted text-7xl relative z-10" style="font-variation-settings: 'FILL' 1;">heart_broken</span>
</div>
<!-- Text Content -->
<div class="space-y-3">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-text-main">
        Oops, link expired.
      </h1>
<p class="text-base md:text-lg text-muted max-w-sm mx-auto leading-relaxed">
        Looks like this greeting got lost in the mail.
      </p>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="inline-flex items-center justify-center px-8 py-3.5 border-2 border-primary text-primary bg-transparent hover:bg-primary/5 active:bg-primary/10 rounded-full font-semibold text-base transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2 focus:ring-offset-background-light">
        Make Your Own
      </button>
</div>
</div>
</body></html>
