<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Joy - Create Greeting</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e64cbf",
                        "background-light": "#f8f6f7",
                        "background-dark": "#21111d",
                        "surface-light": "#FFF7F9",
                        "text-main": "#4A3E4D",
                        "text-muted": "#A89CAE",
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
                    boxShadow: {
                        'glow': '0 20px 40px -10px rgba(230, 76, 191, 0.25)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Outfit', sans-serif;
        }
        .soft-input {
            transition: all 0.3s ease;
        }
        .soft-input:focus-within {
            box-shadow: 0 0 0 2px rgba(230, 76, 191, 0.3);
            background-color: #fff;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display text-text-main antialiased selection:bg-primary/20 selection:text-primary relative overflow-x-hidden">
<!-- screen: generator | route: /create -->
<!-- Explicitly excluded TopNavBar as this is a focused form view (Generator Screen) -->
<header class="w-full flex justify-between items-center p-6 max-w-5xl mx-auto absolute top-0 left-0 right-0 z-10">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-sm hover:shadow-md transition-shadow text-text-muted hover:text-primary focus:outline-none focus:ring-2 focus:ring-primary/50">
<span class="material-symbols-outlined text-xl">arrow_back</span>
</button>
<div class="flex items-center gap-2 opacity-50">
<svg class="w-6 h-6 text-primary" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
<span class="font-bold text-sm tracking-tight">Modern Joy</span>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4 sm:p-8 pt-24 relative z-0">
<!-- Background decorative elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-primary/5 blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-[480px] bg-white rounded-[24px] shadow-glow p-8 sm:p-10 relative z-10">
<div class="text-center mb-8">
<div class="w-16 h-16 bg-surface-light rounded-full flex items-center justify-center mx-auto mb-4 text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="text-3xl font-bold tracking-tight mb-2 text-slate-900 dark:text-slate-100">Create Magic Link</h1>
<p class="text-text-muted">Generate a personalized Eid greeting to share.</p>
</div>
<form class="space-y-5">
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 ml-1" for="recipient">To</label>
<div class="soft-input bg-surface-light rounded-2xl flex items-center px-4 h-14">
<span class="material-symbols-outlined text-text-muted mr-3">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-slate-900 placeholder:text-text-muted/60" id="recipient" placeholder="Recipient's name" required="" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 ml-1" for="message">Message</label>
<div class="soft-input bg-surface-light rounded-[20px] p-4 flex items-start">
<span class="material-symbols-outlined text-text-muted mr-3 mt-0.5">edit_note</span>
<textarea class="w-full bg-transparent border-none focus:ring-0 p-0 text-slate-900 placeholder:text-text-muted/60 resize-y min-h-[100px]" id="message" placeholder="Write your heartfelt Eid wishes..." rows="4"></textarea>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 ml-1" for="sender">From</label>
<div class="soft-input bg-surface-light rounded-2xl flex items-center px-4 h-14">
<span class="material-symbols-outlined text-text-muted mr-3">favorite</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-slate-900 placeholder:text-text-muted/60" id="sender" placeholder="Your name" required="" type="text"/>
</div>
</div>
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-semibold rounded-full shadow-glow mt-8 transition-transform active:scale-[0.98] flex items-center justify-center gap-2 group" type="button">
<span>Generate Link</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Success State / Output Box (Hidden by default, shown for demonstration of the UI) -->
<div class="mt-8 pt-6 border-t border-slate-100 hidden">
<p class="text-sm font-medium text-slate-700 mb-3 text-center">Your magic link is ready!</p>
<div class="flex items-center gap-2 bg-surface-light p-2 rounded-full border border-primary/20">
<input class="flex-1 bg-transparent border-none focus:ring-0 text-sm text-text-muted px-4 truncate" readonly="" type="text" value="https://modernjoy.co/g/eid-mubarak-123"/>
<button class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-colors flex-shrink-0" title="Copy to clipboard">
<span class="material-symbols-outlined text-sm">content_copy</span>
</button>
</div>
</div>
</div>
</main>
<!-- Toast Notification (Hidden by default) -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
<span class="material-symbols-outlined text-green-400 text-xl">check_circle</span>
<span class="text-sm font-medium">Copied to clipboard!</span>
</div>
</body></html>
