<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Joy - Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#e64cbf",
                    "background-light": "#FFF7F9",
                    "background-dark": "#21111d",
                    "surface": "#FFFFFF",
                    "text-main": "#4A3E4D",
                    "text-muted": "#A89CAE",
                    "accent": "#FAD59B"
                },
                fontFamily: {
                    "display": ["Outfit", "sans-serif"],
                    "body": ["DM Sans", "sans-serif"]
                },
                borderRadius: { "DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px" },
                boxShadow: {
                    "glow": "0 20px 40px -10px rgba(230, 76, 191, 0.25)"
                },
                animation: {
                    "spin-slow": "spin 1.2s linear infinite",
                    "pulse-dot": "pulseDot 1.4s cubic-bezier(0.4, 0, 0.6, 1) infinite"
                },
                keyframes: {
                    pulseDot: {
                        "0%, 100%": { opacity: "1", transform: "scale(1)" },
                        "50%": { opacity: "0.4", transform: "scale(0.85)" }
                    }
                }
            },
        },
    }
</script>
<style>
    body {
        font-family: 'DM Sans', sans-serif;
    }
    h1, h2, h3, h4, h5, h6, .font-display {
        font-family: 'Outfit', sans-serif;
    }

    /* Spinner ring */
    .spinner-ring {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #e64cbf;
        border-right-color: #e64cbf40;
        animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>
</head>
<!-- screen: loading | route: /wish/[id] (loading state) -->
<body class="bg-background-light dark:bg-background-dark font-body text-text-main antialiased min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient background glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] bg-accent/10 rounded-full blur-[80px] pointer-events-none z-0"></div>

<!-- Loading Container -->
<main class="relative z-10 flex flex-col items-center justify-center text-center gap-6">
<!-- Spinner -->
<div class="relative flex items-center justify-center">
<!-- Outer glow ring -->
<div class="absolute inset-0 rounded-full bg-primary/10 blur-xl scale-150 pointer-events-none"></div>
<!-- Spinner -->
<div class="spinner-ring"></div>
</div>

<!-- Text -->
<div class="flex flex-col gap-2">
<p class="font-display font-semibold text-lg text-text-main dark:text-slate-100 tracking-tight">Loading wish...</p>
<p class="font-body text-sm text-text-muted dark:text-slate-400">Unwrapping your special message</p>
</div>

<!-- Animated dots -->
<div class="flex items-center gap-2 mt-2">
<div class="w-2 h-2 rounded-full bg-primary/60" style="animation: pulseDot 1.4s cubic-bezier(0.4,0,0.6,1) infinite; animation-delay: 0ms;"></div>
<div class="w-2 h-2 rounded-full bg-primary/60" style="animation: pulseDot 1.4s cubic-bezier(0.4,0,0.6,1) infinite; animation-delay: 200ms;"></div>
<div class="w-2 h-2 rounded-full bg-primary/60" style="animation: pulseDot 1.4s cubic-bezier(0.4,0,0.6,1) infinite; animation-delay: 400ms;"></div>
</div>
</main>
</body></html>
