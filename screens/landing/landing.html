<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Joy - Eid Greeting</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#e64cbf",
          "background-light": "#FFF7F9",
          "background-dark": "#21111d",
          "surface": "#FFFFFF",
          "text-main": "#4A3E4D",
          "muted": "#A89CAE",
          "accent": "#FAD59B"
        },
        fontFamily: {
          "display": ["Outfit", "sans-serif"],
          "body": ["DM Sans", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
        boxShadow: {
          'glow': '0 20px 40px -10px rgba(230, 76, 191, 0.25)',
          'glow-hover': '0 30px 50px -10px rgba(230, 76, 191, 0.4)'
        },
        animation: {
          'float': 'float 6s ease-in-out infinite',
          'pulse-slow': 'pulse-slow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite'
        },
        keyframes: {
          float: {
            '0%, 100%': { transform: 'translateY(0)' },
            '50%': { transform: 'translateY(-10px)' },
          },
          'pulse-slow': {
            '0%, 100%': { opacity: '1', transform: 'scale(1)' },
            '50%': { opacity: '.9', transform: 'scale(1.02)' },
          }
        }
      },
    },
  }
</script>
<style>
  body {
    font-family: 'DM Sans', sans-serif;
  }
  h1, h2, h3, h4, h5, h6, .font-display {
    font-family: 'Outfit', sans-serif;
  }
  
  /* Transition utility for click effect */
  .opening-transition .envelope-graphic {
    transform: scale(1.5) translateY(20px);
    opacity: 0;
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .opening-transition .text-content {
    opacity: 0;
    transform: translateY(-20px);
    transition: all 0.4s ease-out;
  }
  
  /* Gradient text utility */
  .text-gradient {
    background: linear-gradient(135deg, #e64cbf, #FAD59B);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
</style>
</head>
<!-- screen: landing | route: / -->
<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-slate-100 min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary transition-colors duration-300">
<main class="flex-1 flex flex-col items-center justify-center p-6 relative overflow-hidden h-screen max-h-screen">
<!-- Ambient background glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[100px] pointer-events-none z-0"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[400px] bg-accent/10 rounded-full blur-[80px] pointer-events-none z-0 mix-blend-multiply dark:mix-blend-screen"></div>
<div class="z-10 flex flex-col items-center max-w-[600px] w-full gap-12 sm:gap-16 transition-all duration-700 w-full" id="main-container">
<!-- Header -->
<div class="text-content text-center flex flex-col gap-2">
<p class="font-body text-muted dark:text-slate-400 font-medium tracking-widest uppercase text-sm mb-2">A Special Message For You</p>
<h1 class="font-display text-[36px] sm:text-[48px] font-bold leading-tight text-text-main dark:text-slate-50 tracking-tight">
        Eid Mubarak
      </h1>
</div>
<!-- Interactive Envelope Graphic -->
<div class="relative group cursor-pointer" onclick="document.getElementById('main-container').classList.add('opening-transition')">
<!-- Glow effect behind envelope -->
<div class="absolute inset-0 bg-gradient-to-br from-accent/40 to-primary/40 rounded-xl blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500 scale-110"></div>
<div class="envelope-graphic relative w-[180px] h-[120px] sm:w-[240px] sm:h-[160px] transform transition-all duration-500 group-hover:-translate-y-2 animate-float shadow-glow group-hover:shadow-glow-hover rounded-xl bg-surface dark:bg-slate-800 border border-primary/10 overflow-hidden flex items-center justify-center">
<!-- Envelope Flap (Top) -->
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-primary/10 to-transparent clip-path-polygon-[0_0,_100%_0,_50%_100%] border-b border-primary/5 z-10">
<svg class="w-full h-full text-primary/20" data-alt="Envelope flap graphic" fill="none" viewbox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
<path d="M0 0L120 70L240 0" stroke="currentColor" stroke-width="2"></path>
</svg>
</div>
<!-- Envelope Body Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-[#FAD59B] to-[#e64cbf] opacity-10"></div>
<!-- Decorative Seal -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-10 sm:w-12 sm:h-12 bg-surface dark:bg-slate-800 rounded-full shadow-md z-20 flex items-center justify-center border border-primary/20 group-hover:scale-110 group-hover:rotate-12 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-xl sm:text-2xl" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<!-- Envelope Fold Lines -->
<svg class="absolute inset-0 w-full h-full text-primary/10" data-alt="Envelope base graphic" fill="none" viewbox="0 0 240 160" xmlns="http://www.w3.org/2000/svg">
<path d="M0 160L120 70L240 160" stroke="currentColor" stroke-width="2"></path>
<path d="M0 0L80 80" stroke="currentColor" stroke-width="1"></path>
<path d="M240 0L160 80" stroke="currentColor" stroke-width="1"></path>
</svg>
</div>
</div>
<!-- CTA Area -->
<div class="text-content flex justify-center w-full px-4">
<button class="group relative flex items-center justify-center w-full sm:w-[200px] h-14 rounded-full bg-primary text-white font-display font-semibold text-[16px] tracking-wide shadow-glow hover:shadow-glow-hover hover:-translate-y-1 transition-all duration-300 overflow-hidden" onclick="document.getElementById('main-container').classList.add('opening-transition')">
<span class="relative z-10 flex items-center gap-2">
          Open Letter
          <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</span>
<!-- Button hover highlight -->
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
</button>
</div>
</div>
</main>
<script>
  // Simple interaction script to mimic routing
  document.querySelectorAll('button, .group.cursor-pointer').forEach(el => {
    el.addEventListener('click', () => {
      setTimeout(() => {
        // Reset animation for demo purposes
        document.getElementById('main-container').classList.remove('opening-transition');
      }, 1500);
    });
  });
</script>
</body></html>
