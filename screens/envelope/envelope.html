<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Open Greeting - Modern Joy</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&amp;family=Outfit:wght@400;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e64cbf",
                        "background-light": "#FFF7F9",
                        "background-dark": "#21111d",
                        "surface": "#FFFFFF",
                        "text-main": "#4A3E4D",
                        "muted": "#A89CAE",
                        "accent": "#FAD59B"
                    },
                    fontFamily: {
                        "display": ["Outfit", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "24px",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "glow": "0 20px 40px -10px rgba(212, 150, 196, 0.25)",
                        "seal": "0 8px 16px rgba(0,0,0,0.05)"
                    }
                },
            },
        }
    </script>
<style>
        .envelope-wrapper {
            perspective: 1000px;
        }
        
        .flap {
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* The seal rotation on hover */
        .seal-btn {
            transition: all 0.3s ease;
        }
        .seal-btn:hover {
            transform: scale(1.05) rotate(15deg);
        }

        /* Background Aura */
        .aura-bg {
            background: radial-gradient(circle at center, rgba(250, 213, 155, 0.15) 0%, transparent 60%);
        }
        
        /* Simulating the open state for demonstration (normally handled by JS/routing) */
        .envelope-wrapper:active .flap {
            transform: rotateX(180deg);
        }
        .envelope-wrapper:active .letter {
            transform: translateY(-80px);
            transition-delay: 0.3s;
            opacity: 1;
        }
        
        .letter {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(0);
        }
    </style>
</head>
<!-- screen: envelope | route: UNASSIGNED -->
<body class="bg-background-light dark:bg-background-dark font-body text-text-main min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Radial Aura Background -->
<div class="absolute inset-0 aura-bg pointer-events-none"></div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-[600px] flex items-center justify-center p-4">
<!-- Envelope Interactive Area -->
<div class="envelope-wrapper relative w-[90vw] max-w-[400px] h-[260px] cursor-pointer group">
<!-- Envelope Back -->
<div class="absolute inset-0 bg-[#E8D5E3] rounded-lg shadow-glow overflow-hidden">
<!-- Inner Letter Peek -->
<div class="letter absolute inset-x-4 top-4 bottom-0 bg-surface rounded-t-lg shadow-inner z-0 flex items-start justify-center pt-8">
<div class="w-3/4 h-2 bg-muted/20 rounded-full mb-4"></div>
</div>
</div>
<!-- Envelope Front Fold (Left/Right/Bottom) -->
<div class="absolute inset-0 z-10 overflow-hidden rounded-lg pointer-events-none">
<!-- Left Flap -->
<div class="absolute inset-0 bg-primary/20" style="clip-path: polygon(0 0, 50% 50%, 0 100%);"></div>
<!-- Right Flap -->
<div class="absolute inset-0 bg-primary/20" style="clip-path: polygon(100% 0, 50% 50%, 100% 100%);"></div>
<!-- Bottom Flap -->
<div class="absolute inset-0 bg-primary/40" style="clip-path: polygon(0 100%, 50% 50%, 100% 100%);"></div>
</div>
<!-- Envelope Top Flap (Animated) -->
<div class="flap absolute top-0 left-0 w-full h-full z-20 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-[60%] bg-[#D496C4] rounded-t-lg" style="clip-path: polygon(0 0, 100% 0, 50% 100%);"></div>
</div>
<!-- Seal Button -->
<button aria-label="Open Envelope" class="seal-btn absolute top-[40%] left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 w-[80px] h-[80px] bg-surface rounded-full shadow-seal flex flex-col items-center justify-center text-primary border-2 border-primary/10">
<span class="material-symbols-outlined mb-1" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-display font-semibold text-xs tracking-wide">Open Me</span>
</button>
</div>
</main>
</body></html>
